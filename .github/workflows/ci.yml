name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o /dev/null ./cmd/hub

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/watchdog/Watchdog
            # Fetch + reset (NOT git pull). git pull silently fails with
            # 'You are not currently on a branch' if the working tree is
            # in detached HEAD — which it ends up in any time someone runs
            # `git checkout <tag>` for a release deploy. We hit that
            # exact bug after the v1.0.0 retag: every CI run since silently
            # built from stale source (cached layers all the way through),
            # only surfacing when migration 102 hit the DB without the
            # filesystem 102_*.sql being present. Reset --hard works
            # regardless of HEAD state and is the right primitive for a
            # one-way 'make this checkout match origin/main' deploy.
            git fetch origin --tags --force
            git reset --hard origin/main
            git rev-parse --short HEAD
            cd deployments
            docker compose -f docker-compose.prod.yml up -d --build hub
