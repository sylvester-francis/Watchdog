services:
  caddy:
    image: caddy:2-alpine
    container_name: watchdog-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hub
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: watchdog-db
    environment:
      POSTGRES_USER: ${DB_USER:-watchdog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-watchdog}
    volumes:
      - watchdog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchdog -d watchdog"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hub:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.hub
    container_name: watchdog-hub
    environment:
      DATABASE_URL: postgres://${DB_USER:-watchdog}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-watchdog}?sslmode=disable
      PORT: 8080
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      SERVER_SECURE_COOKIES: "true"
      ALLOWED_ORIGINS: https://usewatchdog.dev
      # Transactional email (forgot-password reset). All optional — when
      # SMTP_HOST + SMTP_FROM are empty, the password reset routes simply
      # don't register and the /forgot-password link 404s.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Set to "true" when relaying to a trusted local Postfix addressed by
      # IP whose cert is for a different hostname (matches EE Kratos's
      # `?skip_ssl_verify=true` flag). Default false = strict cert verify.
      SMTP_TLS_INSECURE_SKIP_VERIFY: ${SMTP_TLS_INSECURE_SKIP_VERIFY:-false}
      # Public URL used to build reset links in email bodies. Falls back to
      # the first ALLOWED_ORIGIN if unset.
      PUBLIC_URL: ${PUBLIC_URL:-https://usewatchdog.dev}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  watchdog_data:
  caddy_data:
  caddy_config:
